name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # Swift 6 tools version needs a recent Xcode; select the newest the
      # runner has rather than trusting the default
      - name: Select Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$latest" ]; then latest=$(ls -d /Applications/Xcode*.app | sort -V | tail -1); fi
          echo "Using $latest"
          sudo xcode-select -s "$latest"
          swift --version

      - name: Build
        run: swift build -v

      - name: Test RazerStreamKit
        run: swift test -v
        working-directory: Packages/RazerStreamKit
